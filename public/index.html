<!DOCTYPE html>
<html>
<head>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f172a">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>WAMOT LAB</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
  --bg-color: #0f172a;
  --card-bg: rgba(255, 255, 255, 0.03);
  --text-color: #f8fafc;
  --accent-color: #38bdf8;
  --status-good: #10b981;
  --status-warn: #f59e0b;
  --status-bad: #ef4444;
  --button-grad: linear-gradient(135deg, #3b82f6, #06b6d4);
  --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
}

body.light-theme {
  --bg-color: #f8fafc;
  --card-bg: rgba(255, 255, 255, 0.9);
  --text-color: #0f172a;
  --accent-color: #0284c7;
  --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
}

body {
  margin: 0;
  font-family: 'Outfit', 'Segoe UI', sans-serif;
  background-color: var(--bg-color);
  color: var(--text-color);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  min-height: 100vh;
}

/* Glassmorphism Cards */
.card {
  background: var(--card-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  padding: 24px;
  border-radius: 24px;
  box-shadow: var(--shadow);
  transition: transform 0.2s ease;
}

.card:hover {
  transform: translateY(-2px);
}

/* Dashboard Layout */
.dashboard {
  display: none;
  padding: 24px;
  max-width: 1200px;
  margin: 0 auto;
}

.dashboard-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 32px;
  flex-wrap: wrap;
  gap: 15px;
}

.dashboard-header h1 {
  margin: 0;
  font-size: 1.8rem;
  background: var(--button-grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 24px;
}

h2 { 
  color: var(--accent-color);
  margin-top: 0;
  font-size: 1.2rem;
  display: flex;
  align-items: center;
  gap: 10px;
}

.status { 
  display: inline-block;
  padding: 6px 14px; 
  border-radius: 12px; 
  font-weight: 600; 
  font-size: 0.85rem;
  margin-top: 10px;
}
.good { background: rgba(16, 185, 129, 0.15); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); }
.warn { background: rgba(245, 158, 11, 0.15); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.2); }
.bad { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }

/* Login UI Fix */
.login-container {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  background: radial-gradient(circle at top right, #1e293b, #0f172a);
}

.login-card {
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(20px);
  padding: 40px;
  border-radius: 32px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  width: 100%;
  max-width: 380px;
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
}

.input-group {
  margin-bottom: 20px;
  position: relative;
}

.input-group input {
  width: 100%;
  padding: 16px 20px;
  border-radius: 16px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  background: rgba(255, 255, 255, 0.05);
  color: white;
  font-size: 1rem;
  transition: 0.3s;
  box-sizing: border-box;
}

.input-group input:focus {
  outline: none;
  border-color: var(--accent-color);
  background: rgba(255, 255, 255, 0.1);
}

.login-btn, .action-btn {
  width: 100%;
  padding: 16px;
  border-radius: 16px;
  border: none;
  background: var(--button-grad);
  color: white;
  font-weight: 700;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
}

.login-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
}

.icon-btn {
  background: var(--card-bg);
  border: 1px solid rgba(255, 255, 255, 0.1);
  color: var(--text-color);
  width: 45px;
  height: 45px;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.mode-buttons {
  display: flex;
  gap: 12px;
  margin-top: 20px;
}

.mode-buttons button {
  flex: 1;
  background: rgba(255, 255, 255, 0.05);
  color: var(--text-color);
  border: 1px solid rgba(255, 255, 255, 0.1);
  padding: 12px;
  border-radius: 14px;
  cursor: pointer;
  font-weight: 600;
  transition: 0.3s;
}

.mode-buttons button.active {
  background: var(--button-grad);
  color: white;
  border: none;
}

/* Toast Notifications */
#notification-container {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.toast {
  padding: 16px 24px;
  border-radius: 16px;
  background: #1e293b;
  color: white;
  box-shadow: 0 10px 15px -3px rgba(0,0,0,0.4);
  display: flex;
  align-items: center;
  gap: 12px;
  animation: slideIn 0.3s ease forwards;
  border-left: 4px solid var(--accent-color);
  min-width: 250px;
}

@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

.toast.alert { border-left-color: var(--status-bad); }

/* Custom Switch */
.switch-container {
  display: flex;
  align-items: center;
  gap: 15px;
  margin: 15px 0;
}

.switch {
  position: relative;
  display: inline-block;
  width: 50px;
  height: 26px;
}

.switch input { opacity: 0; width: 0; height: 0; }

.slider {
  position: absolute;
  cursor: pointer;
  top: 0; left: 0; right: 0; bottom: 0;
  background-color: rgba(255,255,255,0.1);
  transition: .4s;
  border-radius: 34px;
}

.slider:before {
  position: absolute;
  content: "";
  height: 18px; width: 18px;
  left: 4px; bottom: 4px;
  background-color: white;
  transition: .4s;
  border-radius: 50%;
}

input:checked + .slider { background: var(--status-good); }
input:checked + .slider:before { transform: translateX(24px); }

</style>
</head>

<body>

<div id="notification-container"></div>

<div class="login-container" id="loginScreen">
  <div class="login-card">
    <h1 style="text-align:center; color:white; margin-bottom:30px;"><i class="fas fa-water"></i> WAMOT</h1>
    <div class="input-group">
      <input id="device_id" placeholder="Device ID">
    </div>
    <div class="input-group">
      <input id="password" type="password" placeholder="Password">
      <i class="fas fa-eye toggle-password" onclick="togglePassword()"></i>
    </div>
    <button class="login-btn" onclick="login()">Access Device</button>
  </div>
</div>

<div class="dashboard" id="dashboard">
  <div class="dashboard-header">
    <h1><i class="fas fa-water"></i> WAMOT</h1>
    <div>
      <button onclick="toggleTheme()" class="icon-btn"><i class="fas fa-adjust"></i></button>
      <button onclick="openSettings()" class="icon-btn"><i class="fas fa-cog"></i></button>
    </div>

  </div>

  <div class="grid">
    <div class="card">
      <h2><i class="fas fa-tint"></i> TDS</h2>
      <p id="tds" style="font-size: 1.5rem; font-weight: bold;">--</p>
      <div id="waterStatus" class="status">--</div>
    </div>

    <div class="card">
      <h2><i class="fas fa-ruler-vertical"></i> Water Level</h2>
      <p id="level" style="font-size: 1.5rem; font-weight: bold;">--</p>
    </div>

    <div class="card">
      <h2><i class="fas fa-power-off"></i> Motor</h2>
      <div id="switchContainer" class="switch-container">
        <label class="switch">
          <input type="checkbox" id="relaySwitch" onchange="toggleRelay()">
          <span class="slider"></span>
        </label>
        <p id="switchLabel">OFF</p>
      </div>
      <div class="mode-buttons" id="modeButtons">
        <button id="btn-manual" onclick="setMode('MANUAL')">Manual</button>
        <button id="btn-auto" onclick="setMode('AUTO')">Auto</button>
      </div>
    </div>

    <div class="card">
      <h2><i class="fas fa-chart-line"></i> Water Level History</h2>
      <canvas id="chart"></canvas>
      <button onclick="exportData()" style="margin-top: 15px;"><i class="fas fa-download"></i> Export Data</button>
    </div>
  </div>
</div>

<script>
let device_id = "";
let password = "";
let chart;
let manualOverride = false;
let historyData = [];

function toggleTheme() {
  document.body.classList.toggle('light-theme');
}

function togglePassword() {
  const passwordField = document.getElementById("password");
  const icon = document.querySelector(".toggle-password");
  if (passwordField.type === "password") {
    passwordField.type = "text";
    icon.className = "fas fa-eye-slash toggle-password";
  } else {
    passwordField.type = "password";
    icon.className = "fas fa-eye toggle-password";
  }
}

function openSettings() {
  const tdsThreshold = prompt("Enter TDS Alert Threshold:", localStorage.getItem('tdsThreshold') || 600);
  const levelThreshold = prompt("Enter Water Level Alert Threshold:", localStorage.getItem('levelThreshold') || 20);
  
  if (tdsThreshold) localStorage.setItem('tdsThreshold', tdsThreshold);
  if (levelThreshold) localStorage.setItem('levelThreshold', levelThreshold);
  notify("Settings Updated", "info");
}

function notify(msg, type = "info") {
  const container = document.getElementById("notification-container");
  const toast = document.createElement("div");
  toast.className = `toast ${type === 'alert' ? 'alert' : ''}`;
  toast.innerHTML = `<i class="fas ${type === 'alert' ? 'fa-exclamation-triangle' : 'fa-info-circle'}"></i> <span>${msg}</span>`;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 4000);
}

function checkThresholds(tds, level) {
  const tdsThreshold = localStorage.getItem('tdsThreshold') || 600;
  const levelThreshold = localStorage.getItem('levelThreshold') || 20;

  if (tds > tdsThreshold || level < levelThreshold) {
     const lastAlert = localStorage.getItem('lastAlert');
     if (!lastAlert || (Date.now() - lastAlert > 600000)) { 
         notify(`⚠️ Alert! High TDS: ${tds} or Low Level: ${level}`, "alert");
         localStorage.setItem('lastAlert', Date.now());
     }
  }
}

async function login() {
  device_id = document.getElementById("device_id").value;
  password = document.getElementById("password").value;

  const res = await fetch("/api/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ device_id, password })
  });

  const data = await res.json();
  if (!data.success) return alert("Invalid login");

  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("dashboard").style.display = "block";
  notify("Connected Successfully", "info");

  getData();
  loadHistory();
  getRelayState();
}

async function getData() {
  const res = await fetch("/api/get-data", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ device_id, password })
  });

  const data = await res.json();

  document.getElementById("tds").innerText = data.tds ?? "--";
  document.getElementById("level").innerText = data.water_level ?? "--";

  updateWaterStatus(data.tds);
  checkThresholds(data.tds, data.water_level);
}

function updateWaterStatus(tds) {
  const status = document.getElementById("waterStatus");

  if (tds < 300) {
    status.innerText = "💧 Excellent (Drinkable)";
    status.className = "status good";
  } else if (tds < 600) {
    status.innerText = "⚠ Moderate";
    status.className = "status warn";
  } else {
    status.innerText = "❌ Not Drinkable";
    status.className = "status bad";
  }
}

async function getRelayState() {
  if (manualOverride) return;

  const res = await fetch("/api/get-relay", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ device_id, password })
  });

  const data = await res.json();
  updateRelayUI(data.relay || data.state);
}

function updateRelayUI(state) {
  const box = document.getElementById("switchContainer");
  const sw = document.getElementById("relaySwitch");
  const label = document.getElementById("switchLabel");

  if (state === "ON") {
    sw.checked = true;
    box.classList.remove("disabled");
    label.innerText = "ON";
  } else if (state === "OFF") {
    sw.checked = false;
    box.classList.remove("disabled");
    label.innerText = "OFF";
  } else {
    box.classList.add("disabled");
    label.innerText = "AUTO";
  }
}

function toggleRelay() {
  manualOverride = true;
  const state = document.getElementById("relaySwitch").checked ? "ON" : "OFF";
  setRelay(state);
  setTimeout(() => manualOverride = false, 3000);
}

function setMode(mode) {
  manualOverride = true;
  
  document.getElementById("btn-manual").classList.toggle("active", mode === "MANUAL");
  document.getElementById("btn-auto").classList.toggle("active", mode === "AUTO");

  if (mode === "AUTO") {
    document.getElementById("switchContainer").classList.add("disabled");
    document.getElementById("switchLabel").innerText = "AUTO";
    setRelay("AUTO");
  } else {
    document.getElementById("switchContainer").classList.remove("disabled");
    notify("Switched to Manual Mode");
  }

  setTimeout(() => manualOverride = false, 3000);
}

async function setRelay(state) {
  await fetch("/api/set-relay", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ device_id, password, state })
  });
}

async function loadHistory() {
  const res = await fetch("/api/get-history", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ device_id, password })
  });

  historyData = await res.json();

  const labels = historyData.map(d => new Date(d.created_at).toLocaleTimeString());
  const values = historyData.map(d => d.water_level);

  drawChart(labels, values);
}

function exportData() {
  if (historyData.length === 0) return alert("No data to export");
  
  let csv = "Time,WaterLevel\n";
  historyData.forEach(d => {
    csv += `${d.created_at},${d.water_level}\n`;
  });
  
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.setAttribute('href', url);
  a.setAttribute('download', 'water_report.csv');
  a.click();
}

function drawChart(labels, values) {
  if (chart) chart.destroy();

  const ctx = document.getElementById("chart").getContext("2d");

  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "Water Level",
        data: values,
        borderColor: "#38bdf8",
        backgroundColor: "rgba(56,189,248,0.2)",
        fill: true,
        tension: 0.4,
        pointRadius: 0
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false
    }
  });
}

setInterval(() => {
  if (device_id) {
    getData();
    getRelayState();
  }
}, 5000);
</script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/service-worker.js")
    .then(() => console.log("Service Worker Registered"));
}
</script>

</body>
</html>
